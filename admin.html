<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Admin — Barber Life Simone</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold2: #E8C96A;
  --gold3: rgba(201,168,76,0.12);
  --black: #080808;
  --d1: #101010;
  --d2: #181818;
  --d3: #222;
  --d4: #2a2a2a;
  --white: #F5F0E8;
  --gray: #666;
  --gray2: #444;
  --green: #3ddc84;
  --red: #ff5252;
  --radius: 12px;
  --radius-sm: 8px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { -webkit-tap-highlight-color: transparent; }

body {
background: var(–black);
color: var(–white);
font-family: ‘Jost’, sans-serif;
font-weight: 300;
min-height: 100svh;
overflow-x: hidden;
}

/* ══════════════════════════════
LOGIN
══════════════════════════════ */
#loginScreen {
min-height: 100svh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 32px 24px;
position: relative;
overflow: hidden;
}

.login-bg {
position: absolute;
inset: 0;
background:
radial-gradient(ellipse 70% 50% at 50% 0%, rgba(201,168,76,0.07) 0%, transparent 60%),
radial-gradient(ellipse 50% 40% at 80% 100%, rgba(201,168,76,0.04) 0%, transparent 50%);
pointer-events: none;
}

.login-grid {
position: absolute;
inset: 0;
background-image:
linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

.login-brand {
position: relative;
z-index: 2;
text-align: center;
margin-bottom: 48px;
}

.login-scissors {
font-size: 2.4rem;
margin-bottom: 16px;
display: block;
animation: float 3s ease-in-out infinite;
}

@keyframes float {
0%, 100% { transform: translateY(0) rotate(-10deg); }
50% { transform: translateY(-6px) rotate(10deg); }
}

.login-brand h1 {
font-family: ‘Playfair Display’, serif;
font-size: 2rem;
font-weight: 700;
letter-spacing: 0.02em;
color: var(–white);
line-height: 1;
}

.login-brand p {
font-size: 0.62rem;
letter-spacing: 0.5em;
text-transform: uppercase;
color: var(–gold);
margin-top: 10px;
}

.login-card {
position: relative;
z-index: 2;
width: 100%;
max-width: 360px;
background: linear-gradient(145deg, var(–d2), var(–d1));
border: 1px solid rgba(201,168,76,0.2);
border-radius: var(–radius);
padding: 36px 28px;
box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
}

.login-card::before {
content: ‘’;
position: absolute;
top: 0; left: 20%; right: 20%;
height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
}

.field-label {
font-size: 0.6rem;
letter-spacing: 0.35em;
text-transform: uppercase;
color: var(–gold);
margin-bottom: 10px;
display: block;
}

.field-wrap {
position: relative;
}

.field-wrap input {
width: 100%;
background: var(–d3);
border: 1px solid var(–d4);
border-radius: var(–radius-sm);
color: var(–white);
font-family: ‘Jost’, sans-serif;
font-size: 1.3rem;
letter-spacing: 0.25em;
padding: 16px 50px 16px 18px;
outline: none;
transition: border-color 0.3s, box-shadow 0.3s;
}

.field-wrap input:focus {
border-color: var(–gold);
box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}

.field-wrap .eye-btn {
position: absolute;
right: 14px;
top: 50%;
transform: translateY(-50%);
background: none;
border: none;
color: var(–gray);
cursor: pointer;
font-size: 1.1rem;
padding: 4px;
transition: color 0.2s;
}

.field-wrap .eye-btn:hover { color: var(–gold); }

.btn-login {
width: 100%;
margin-top: 24px;
padding: 17px;
background: linear-gradient(135deg, var(–gold), var(–gold2));
color: var(–black);
border: none;
border-radius: var(–radius-sm);
font-family: ‘Jost’, sans-serif;
font-size: 0.72rem;
font-weight: 600;
letter-spacing: 0.35em;
text-transform: uppercase;
cursor: pointer;
position: relative;
overflow: hidden;
transition: transform 0.2s, box-shadow 0.3s;
box-shadow: 0 8px 24px rgba(201,168,76,0.25);
}

.btn-login::before {
content: ‘’;
position: absolute;
top: 0; left: -100%;
width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
transition: left 0.5s;
}

.btn-login:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(201,168,76,0.35); }
.btn-login:hover::before { left: 100%; }
.btn-login:active { transform: translateY(0); }

.login-err {
text-align: center;
color: var(–red);
font-size: 0.75rem;
margin-top: 14px;
min-height: 18px;
letter-spacing: 0.05em;
}

/* ══════════════════════════════
ADMIN PANEL
══════════════════════════════ */
#adminPanel { display: none; }

/* HEADER */
.top-bar {
position: sticky;
top: 0;
z-index: 200;
background: rgba(8,8,8,0.92);
backdrop-filter: blur(24px);
-webkit-backdrop-filter: blur(24px);
border-bottom: 1px solid rgba(201,168,76,0.1);
padding: 14px 20px;
display: flex;
align-items: center;
justify-content: space-between;
}

.top-bar-left {
display: flex;
align-items: center;
gap: 10px;
}

.top-bar-icon {
width: 34px;
height: 34px;
background: var(–gold3);
border: 1px solid rgba(201,168,76,0.25);
border-radius: 8px;
display: flex;
align-items: center;
justify-content: center;
font-size: 1rem;
}

.top-bar h1 {
font-family: ‘Playfair Display’, serif;
font-size: 1.1rem;
font-weight: 400;
color: var(–white);
letter-spacing: 0.02em;
}

.top-bar-sub {
font-size: 0.58rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–gray);
margin-top: 1px;
}

.btn-refresh {
background: none;
border: 1px solid var(–d4);
color: var(–gray);
width: 34px;
height: 34px;
border-radius: 8px;
font-size: 1rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
margin-right: 8px;
}

.btn-refresh:hover { border-color: var(–gold); color: var(–gold); }
.btn-refresh.spin { animation: spin 0.6s linear; }
@keyframes spin { to { transform: rotate(360deg); } }

.btn-logout {
background: none;
border: 1px solid var(–d4);
color: var(–gray);
font-family: ‘Jost’, sans-serif;
font-size: 0.58rem;
letter-spacing: 0.2em;
text-transform: uppercase;
padding: 8px 14px;
border-radius: 8px;
cursor: pointer;
transition: all 0.2s;
}

.btn-logout:hover { border-color: var(–red); color: var(–red); }

/* DATE NAV */
.date-bar {
background: var(–d1);
border-bottom: 1px solid rgba(255,255,255,0.04);
padding: 14px 16px;
display: flex;
align-items: center;
gap: 12px;
}

.date-arrow {
width: 40px;
height: 40px;
background: var(–d2);
border: 1px solid var(–d3);
border-radius: 10px;
color: var(–gold);
font-size: 1.3rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.2s;
flex-shrink: 0;
}

.date-arrow:hover { background: var(–gold3); border-color: rgba(201,168,76,0.3); }

.date-center { flex: 1; text-align: center; }

.date-weekday {
font-family: ‘Playfair Display’, serif;
font-size: 1.15rem;
font-weight: 400;
letter-spacing: 0.02em;
}

.date-full-str {
font-size: 0.62rem;
letter-spacing: 0.2em;
color: var(–gray);
margin-top: 3px;
text-transform: uppercase;
}

.btn-today {
background: var(–gold3);
border: 1px solid rgba(201,168,76,0.2);
color: var(–gold);
font-family: ‘Jost’, sans-serif;
font-size: 0.58rem;
letter-spacing: 0.2em;
text-transform: uppercase;
padding: 8px 12px;
border-radius: 8px;
cursor: pointer;
white-space: nowrap;
transition: all 0.2s;
}

.btn-today:hover { background: rgba(201,168,76,0.2); }

/* STATS */
.stats-row {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
padding: 12px 16px;
background: var(–d1);
border-bottom: 1px solid rgba(255,255,255,0.04);
}

.stat-card {
background: var(–d2);
border: 1px solid var(–d3);
border-radius: 10px;
padding: 12px 10px;
text-align: center;
position: relative;
overflow: hidden;
}

.stat-card.gold { border-color: rgba(201,168,76,0.2); }
.stat-card.green { border-color: rgba(61,220,132,0.2); }

.stat-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
}

.stat-card.gold::before { background: linear-gradient(90deg, transparent, var(–gold), transparent); }
.stat-card.green::before { background: linear-gradient(90deg, transparent, var(–green), transparent); }

.stat-n {
font-family: ‘Playfair Display’, serif;
font-size: 1.9rem;
font-weight: 700;
line-height: 1;
}

.stat-card.gold .stat-n { color: var(–gold); }
.stat-card.green .stat-n { color: var(–green); }
.stat-card:not(.gold):not(.green) .stat-n { color: var(–white); }

.stat-lbl {
font-size: 0.56rem;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(–gray);
margin-top: 4px;
}

/* TIMELINE */
.timeline-wrap {
padding: 16px;
padding-bottom: 100px;
}

.section-label {
font-size: 0.6rem;
letter-spacing: 0.4em;
text-transform: uppercase;
color: var(–gold);
margin-bottom: 10px;
margin-top: 4px;
display: flex;
align-items: center;
gap: 10px;
}

.section-label::after {
content: ‘’;
flex: 1;
height: 1px;
background: rgba(201,168,76,0.15);
}

.slot {
display: flex;
margin-bottom: 6px;
border-radius: 10px;
overflow: hidden;
transition: transform 0.15s;
}

.slot:active { transform: scale(0.99); }

.slot-time {
width: 58px;
min-width: 58px;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.72rem;
font-weight: 500;
letter-spacing: 0.05em;
}

.slot.booked .slot-time {
background: rgba(201,168,76,0.15);
color: var(–gold);
border-right: 2px solid var(–gold);
}

.slot.free .slot-time {
background: rgba(61,220,132,0.06);
color: rgba(61,220,132,0.5);
border-right: 2px solid rgba(61,220,132,0.2);
}

.slot-body {
flex: 1;
padding: 12px 14px;
display: flex;
align-items: center;
justify-content: space-between;
min-height: 58px;
}

.slot.booked .slot-body {
background: linear-gradient(135deg, rgba(201,168,76,0.07), rgba(201,168,76,0.03));
border: 1px solid rgba(201,168,76,0.1);
border-left: none;
border-radius: 0 10px 10px 0;
}

.slot.free .slot-body {
background: rgba(61,220,132,0.03);
border: 1px solid rgba(61,220,132,0.06);
border-left: none;
border-radius: 0 10px 10px 0;
}

.slot-name {
font-size: 0.95rem;
font-weight: 500;
letter-spacing: 0.01em;
}

.slot-service {
font-size: 0.7rem;
color: var(–gold);
margin-top: 2px;
letter-spacing: 0.03em;
}

.slot-tel {
font-size: 0.65rem;
color: var(–gray);
margin-top: 3px;
}

.slot-free-lbl {
font-size: 0.68rem;
color: rgba(61,220,132,0.5);
letter-spacing: 0.1em;
}

.slot-actions { display: flex; gap: 6px; }

.action-btn {
width: 34px;
height: 34px;
border-radius: 8px;
border: none;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
font-size: 0.9rem;
transition: all 0.2s;
text-decoration: none;
flex-shrink: 0;
}

.action-btn.call {
background: rgba(201,168,76,0.1);
color: var(–gold);
border: 1px solid rgba(201,168,76,0.2);
}

.action-btn.call:hover { background: rgba(201,168,76,0.2); }

.action-btn.del {
background: rgba(255,82,82,0.08);
color: rgba(255,82,82,0.5);
border: 1px solid rgba(255,82,82,0.1);
}

.action-btn.del:hover { background: rgba(255,82,82,0.15); color: var(–red); border-color: rgba(255,82,82,0.3); }

.break-divider {
display: flex;
align-items: center;
gap: 12px;
margin: 14px 0;
color: var(–gray2);
font-size: 0.58rem;
letter-spacing: 0.3em;
text-transform: uppercase;
}

.break-divider::before,
.break-divider::after {
content: ‘’;
flex: 1;
height: 1px;
background: var(–d3);
}

/* CLOSED / EMPTY */
.day-closed, .day-empty {
text-align: center;
padding: 60px 20px;
}

.day-closed .big-icon, .day-empty .big-icon {
font-size: 3rem;
margin-bottom: 16px;
display: block;
opacity: 0.4;
}

.day-closed p, .day-empty p {
color: var(–gray);
font-size: 0.8rem;
letter-spacing: 0.15em;
text-transform: uppercase;
}

/* LISTA SECTION */
#listaSection {
display: none;
padding: 16px;
padding-bottom: 100px;
}

.search-wrap {
position: relative;
margin-bottom: 14px;
}

.search-wrap input {
width: 100%;
background: var(–d2);
border: 1px solid var(–d3);
border-radius: 10px;
color: var(–white);
font-family: ‘Jost’, sans-serif;
font-size: 0.9rem;
padding: 14px 16px 14px 44px;
outline: none;
transition: border-color 0.3s;
}

.search-wrap input:focus { border-color: rgba(201,168,76,0.3); }
.search-wrap input::placeholder { color: var(–gray2); }

.search-icon {
position: absolute;
left: 14px;
top: 50%;
transform: translateY(-50%);
color: var(–gray);
font-size: 1rem;
pointer-events: none;
}

.pren-card {
background: var(–d2);
border: 1px solid var(–d3);
border-radius: 12px;
padding: 16px;
margin-bottom: 8px;
display: flex;
align-items: center;
gap: 14px;
animation: slideIn 0.3s ease;
transition: border-color 0.2s;
}

.pren-card:hover { border-color: rgba(201,168,76,0.2); }

@keyframes slideIn {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

.pren-avatar {
width: 44px;
height: 44px;
min-width: 44px;
background: var(–gold3);
border: 1px solid rgba(201,168,76,0.2);
border-radius: 12px;
display: flex;
align-items: center;
justify-content: center;
font-family: ‘Playfair Display’, serif;
font-size: 1.1rem;
color: var(–gold);
font-weight: 700;
}

.pren-info { flex: 1; min-width: 0; }

.pren-name {
font-size: 0.95rem;
font-weight: 500;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.pren-service {
font-size: 0.7rem;
color: var(–gold);
margin-top: 2px;
}

.pren-meta {
display: flex;
gap: 10px;
margin-top: 5px;
}

.pren-chip {
font-size: 0.62rem;
color: var(–gray);
background: var(–d3);
padding: 3px 8px;
border-radius: 20px;
letter-spacing: 0.05em;
}

.pren-actions { display: flex; gap: 6px; }

/* BOTTOM NAV */
.bottom-nav {
position: fixed;
bottom: 0; left: 0; right: 0;
background: rgba(10,10,10,0.96);
backdrop-filter: blur(24px);
-webkit-backdrop-filter: blur(24px);
border-top: 1px solid rgba(255,255,255,0.06);
display: flex;
padding-bottom: env(safe-area-inset-bottom);
z-index: 150;
}

.nav-btn {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 11px 4px;
gap: 5px;
cursor: pointer;
color: var(–gray);
font-size: 0.52rem;
letter-spacing: 0.15em;
text-transform: uppercase;
background: none;
border: none;
font-family: ‘Jost’, sans-serif;
transition: color 0.2s;
position: relative;
}

.nav-btn.active { color: var(–gold); }

.nav-btn.active::before {
content: ‘’;
position: absolute;
top: 0; left: 25%; right: 25%;
height: 2px;
background: var(–gold);
border-radius: 0 0 2px 2px;
}

.nav-btn svg { width: 22px; height: 22px; stroke-width: 1.5; }

/* TOAST */
.toast {
position: fixed;
bottom: 85px;
left: 50%;
transform: translateX(-50%) translateY(10px);
background: var(–d3);
border: 1px solid rgba(201,168,76,0.2);
color: var(–white);
padding: 12px 22px;
border-radius: 40px;
font-size: 0.8rem;
letter-spacing: 0.05em;
opacity: 0;
transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
z-index: 999;
white-space: nowrap;
box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

/* LOADING */
.skeleton {
background: linear-gradient(90deg, var(–d2) 25%, var(–d3) 50%, var(–d2) 75%);
background-size: 200% 100%;
animation: shimmer 1.5s infinite;
border-radius: 10px;
height: 58px;
margin-bottom: 6px;
}

@keyframes shimmer {
0% { background-position: 200% 0; }
100% { background-position: -200% 0; }
}
</style>

</head>

const API_KEY    = "AIzaSyA-v4UrLIZPJGrq4_Mwc12XJlGHM26RLpA";
const PROJECT_ID = "barber-life-simone";
const DB_NAME    = "prenotazioni";
const COLLECTION = "Prenotazione";
const PASSWORD   = "barber2024"; // ← CAMBIA QUI LA TUA PASSWORD

/* ── SLOT ── */
function buildSlots(h1, m1, h2, m2) {
  const s = [];
  let h = h1, m = m1;
  while (h < h2 || (h === h2 && m <= m2)) {
    s.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    m += 30; if (m >= 60) { m = 0; h++; }
  }
  return s;
}
const MATTINA    = buildSlots(9,30,12,30);
const POMERIGGIO = buildSlots(15,30,19,30);
const ALL_SLOTS  = [...MATTINA, ...POMERIGGIO];

/* ── STATE ── */
let currentDate = new Date();
let allPren = [];

/* ── AUTH ── */
function doLogin() {
  const v = document.getElementById('pwdInput').value;
  if (v === PASSWORD) {
    sessionStorage.setItem('bl_admin','1');
    showPanel();
  } else {
    const err = document.getElementById('loginErr');
    err.textContent = 'Password errata, riprova';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').style.borderColor = 'var(--red)';
    setTimeout(() => {
      document.getElementById('pwdInput').style.borderColor = '';
      err.textContent = '';
    }, 2000);
  }
}

function doLogout() {
  sessionStorage.removeItem('bl_admin');
  location.reload();
}

function togglePwd() {
  const i = document.getElementById('pwdInput');
  i.type = i.type === 'password' ? 'text' : 'password';
}

function showPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  document.getElementById('bottomNav').style.display = 'flex';
  init();
}

/* ── INIT ── */
function init() {
  updateDateUI();
  loadData();
}

/* ── DATE ── */
const GIORNI = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const MESI   = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

function updateDateUI() {
  const d = currentDate;
  document.getElementById('wkDay').textContent   = GIORNI[d.getDay()];
  document.getElementById('fullDate').textContent = `${d.getDate()} ${MESI[d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById('topDate').textContent  = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function changeDay(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  updateDateUI();
  renderTimeline();
}

function goToday() {
  currentDate = new Date();
  updateDateUI();
  renderTimeline();
}

function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ── LOAD ── */
async function loadData() {
  showSkeletons();
  try {
    const url = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/${DB_NAME}/documents/${COLLECTION}?key=${API_KEY}&pageSize=500`;
    const res  = await fetch(url);
    const data = await res.json();
    allPren = (data.documents || []).map(doc => {
      const f = doc.fields || {};
      return {
        id:       doc.name.split('/').pop(),
        nome:     f.nome?.stringValue     || '',
        telefono: f.telefono?.stringValue || '',
        servizio: f.servizio?.stringValue || '',
        data:     f.data?.stringValue     || '',
        ora:      f.ora?.stringValue      || '',
      };
    });
    renderTimeline();
    renderLista();
  } catch(e) {
    document.getElementById('timeline').innerHTML = '<div class="day-empty"><span class="big-icon">⚠️</span><p>Errore di rete</p></div>';
  }
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  await loadData();
  setTimeout(() => btn.classList.remove('spin'), 600);
  showToast('✅ Aggiornato');
}

function showSkeletons() {
  document.getElementById('timeline').innerHTML = Array(6).fill('<div class="skeleton"></div>').join('');
}

/* ── TIMELINE ── */
function renderTimeline() {
  const ds  = dateStr(currentDate);
  const dow = currentDate.getDay();
  const tl  = document.getElementById('timeline');

  if (dow === 0 || dow === 1) {
    tl.innerHTML = '<div class="day-closed"><span class="big-icon">🔒</span><p>Negozio chiuso</p></div>';
    document.getElementById('sOcc').textContent = '—';
    document.getElementById('sLib').textContent = '—';
    document.getElementById('sTot').textContent = '—';
    return;
  }

  const dayPren = allPren.filter(p => p.data === ds);
  document.getElementById('sOcc').textContent = dayPren.length;
  document.getElementById('sLib').textContent = ALL_SLOTS.length - dayPren.length;
  document.getElementById('sTot').textContent = ALL_SLOTS.length;

  let html = `<div class="section-label">Mattina</div>`;
  MATTINA.forEach(s => html += slotHTML(s, dayPren));
  html += `<div class="break-divider">Pausa pranzo</div>`;
  html += `<div class="section-label">Pomeriggio</div>`;
  POMERIGGIO.forEach(s => html += slotHTML(s, dayPren));

  tl.innerHTML = html;
}

function slotHTML(time, dayPren) {
  const p = dayPren.find(x => x.ora === time);
  if (p) {
    return `
    <div class="slot booked">
      <div class="slot-time">${time}</div>
      <div class="slot-body">
        <div>
          <div class="slot-name">${p.nome}</div>
          <div class="slot-service">${p.servizio}</div>
          <div class="slot-tel">${p.telefono}</div>
        </div>
        <div class="slot-actions">
          <a class="action-btn call" href="tel:${p.telefono}">📞</a>
          <button class="action-btn del" onclick="deletePren('${p.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }
  return `
  <div class="slot free">
    <div class="slot-time">${time}</div>
    <div class="slot-body">
      <span class="slot-free-lbl">Disponibile</span>
    </div>
  </div>`;
}

/* ── LISTA ── */
function renderLista() {
  const q     = (document.getElementById('searchQ')?.value || '').toLowerCase();
  const cards = document.getElementById('listaCards');
  let list    = [...allPren].sort((a,b) => a.data !== b.data ? a.data.localeCompare(b.data) : a.ora.localeCompare(b.ora));
  if (q) list = list.filter(p => p.nome.toLowerCase().includes(q) || p.telefono.includes(q));

  if (!list.length) {
    cards.innerHTML = '<div class="day-empty"><span class="big-icon">📋</span><p>Nessuna prenotazione</p></div>';
    return;
  }

  cards.innerHTML = list.map(p => {
    const avatar = p.nome ? p.nome.charAt(0).toUpperCase() : '?';
    const dataF  = p.data ? p.data.split('-').reverse().join('/') : '—';
    return `
    <div class="pren-card">
      <div class="pren-avatar">${avatar}</div>
      <div class="pren-info">
        <div class="pren-name">${p.nome}</div>
        <div class="pren-service">${p.servizio}</div>
        <div class="pren-meta">
          <span class="pren-chip">📅 ${dataF}</span>
          <span class="pren-chip">⏰ ${p.ora}</span>
        </div>
      </div>
      <div class="pren-actions">
        <a class="action-btn call" href="tel:${p.telefono}">📞</a>
        <button class="action-btn del" onclick="deletePren('${p.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

/* ── DELETE ── */
async function deletePren(id) {
  if (!confirm('Eliminare questa prenotazione?')) return;
  try {
    const url = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/${DB_NAME}/documents/${COLLECTION}/${id}?key=${API_KEY}`;
    await fetch(url, { method: 'DELETE' });
    allPren = allPren.filter(p => p.id !== id);
    renderTimeline();
    renderLista();
    showToast('✅ Prenotazione eliminata');
  } catch(e) { showToast('❌ Errore'); }
}

/* ── TABS ── */
function showTab(tab) {
  document.getElementById('calSection').style.display   = tab === 'cal'   ? 'block' : 'none';
  document.getElementById('listaSection').style.display = tab === 'lista' ? 'block' : 'none';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nb-' + tab).classList.add('active');
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── BOOT ── */
window.addEventListener('load', () => {
  if (sessionStorage.getItem('bl_admin') === '1') showPanel();
});

setInterval(() => {
  if (sessionStorage.getItem('bl_admin') === '1') loadData();
}, 60000);
</script>
